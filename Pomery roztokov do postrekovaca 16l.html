<div><h1>Pomery roztokov do postrekovaca 16l</h1></div>
<div><br></div>
<div><b>Pre 16 litrov hotového 6 % roztoku:</b><br></div>
<ul>
<li><b>Sulka (koncentrát)</b>: 6 % z 16 litrov = <b>0,96 litra = 960 ml</b><br></li>
<li><b>Voda</b>: 16 litrov – 0,96 litra = <b>15,04 litra</b><br></li>
</ul>
