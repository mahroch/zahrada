<div><b><h2>Tulipány</h2></b><h2><br></h2></div>
<div><b>Množenie</b>:</div>
<ul>
<li><b>Cibuľami</b>: Hlavný spôsob. Po odkvitnutí (máj/jún) nechajte listy odumrieť, aby sa živiny vrátili do cibule. Vykopte cibule (jún/júl), oddelte dcérske cibule od materskej a uskladnite ich na suchom, chladnom mieste (15–20 °C) do jesene.</li>
</ul>
